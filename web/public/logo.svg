<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- 燕云十六声风格背景 -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e" stroke="#e94560" stroke-width="3"/>
  
  <!-- 装饰性云纹 -->
  <path d="M 30 100 Q 50 80 70 100 Q 90 120 110 100 Q 130 80 150 100 Q 170 120 170 100" 
        fill="none" stroke="#e94560" stroke-width="2" opacity="0.5"/>
  <path d="M 30 100 Q 50 120 70 100 Q 90 80 110 100 Q 130 120 150 100 Q 170 80 170 100" 
        fill="none" stroke="#e94560" stroke-width="2" opacity="0.5"/>
  
  <!-- 剑形图案 -->
  <path d="M 100 30 L 100 170 M 85 50 L 100 30 L 115 50 M 85 150 L 100 170 L 115 150" 
        stroke="#ffd700" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 中心装饰 -->
  <circle cx="100" cy="100" r="15" fill="#e94560" opacity="0.8"/>
  <circle cx="100" cy="100" r="8" fill="#ffd700"/>
  
  <!-- 文字 -->
  <text x="100" y="185" font-family="Arial, sans-serif" font-size="14" fill="#ffd700" text-anchor="middle" font-weight="bold">
    燕云十六声
  </text>
</svg>
