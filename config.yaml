# 燕云十六声装备分析工具 - 配置文件

# ==================== 截图设置 ====================
screenshot:
  # 截图保存目录 (相对于 data 目录)
  save_dir: screenshots

  # 截图格式：png, jpg
  format: png

  # PNG 压缩级别 (1-9, 数字越小压缩越快)
  compress_level: 6

  # 自动截图间隔 (秒)，0 表示禁用自动截图
  auto_interval: 0

  # 截图快捷键
  hotkey: f12

  # 游戏窗口标题 (用于定位游戏窗口)
  window_title: 燕云十六声

  # 截图区域 (null 表示全屏，否则指定坐标 [x, y, width, height])
  region: null

# ==================== OCR 设置 ====================
ocr:
  # OCR 引擎：paddle (默认), tesseract
  engine: paddle

  # 识别语言：ch (简体中文), en (英文), mix (混合)
  lang: ch

  # 是否使用 GPU 加速
  use_gpu: false

  # 识别置信度阈值 (低于此值的结果会被过滤)
  confidence_threshold: 0.6

  # 预处理选项
  preprocessing:
    # 是否启用去噪
    denoise: true
    # 是否启用对比度增强
    enhance_contrast: true
    # 是否启用二值化
    binarize: false
    # 高斯模糊核大小 (奇数)
    blur_kernel: 3

# ==================== 数据库设置 ====================
database:
  # 数据库文件路径 (相对于 data 目录)
  path: database/gear_analyzer.db

  # 是否启用 SQL 日志
  echo_sql: false

  # 连接池大小
  pool_size: 5

  # 是否自动创建表
  auto_create_tables: true

# ==================== 飞书同步设置 (可选) ====================
feishu:
  # 是否启用飞书同步
  enabled: false

  # 飞书应用 App ID
  app_id: null

  # 飞书应用 App Secret
  app_secret: null

  # 飞书 Bitable 表 ID
  bitable_app_token: null

  # 数据表 ID
  table_id: null

# ==================== 分析设置 ====================
analyzer:
  # 默认职业 (用于评分)
  default_class: 通用

  # 评分权重配置
  scoring:
    # 基础属性权重
    base_stats:
      attack: 1.0      # 攻击
      defense: 0.8     # 防御
      health: 0.7      # 生命
      crit: 1.5        # 暴击
      crit_damage: 1.5 # 爆伤
      element_damage: 1.3 # 元素伤害

    # 品质基础分
    quality_base_score:
      1: 10   # 白色
      2: 30   # 绿色
      3: 60   # 蓝色
      4: 100  # 紫色
      5: 150  # 金色

    # 强化等级系数
    level_multiplier: 0.1

# ==================== UI 设置 ====================
ui:
  # 界面语言：zh_CN, en_US
  language: zh_CN

  # 主题：light, dark, auto
  theme: auto

  # 主窗口大小
  window_size:
    width: 1280
    height: 800

  # 是否记住窗口位置
  remember_position: true

  # 表格每页显示数量
  page_size: 20

# ==================== 日志设置 ====================
logging:
  # 日志级别：DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: INFO

  # 日志文件路径 (相对于 data 目录)
  file: logs/analyzer.log

  # 日志格式
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

  # 日志文件最大大小 (MB)
  max_size: 10

  # 保留的日志文件数量
  backup_count: 5
